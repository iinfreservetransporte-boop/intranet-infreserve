<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerrando Sesión - Infreserve</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0B2B5E 0%, #1A4A8A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logout-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 420px;
            width: 90%;
        }
        .logout-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .logout-title {
            color: #0B2B5E;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .logout-text {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .btn-login {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #0B2B5E 0%, #1A4A8A 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(11, 43, 94, 0.3);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #0B2B5E;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="logout-container">
        <div class="spinner" id="spinner"></div>
        <div class="logout-icon" id="icon" style="display:none">👋</div>
        <h1 class="logout-title" id="title">Cerrando sesión...</h1>
        <p class="logout-text" id="text">Estamos limpiando tu sesión de forma segura.</p>
        <a href="https://iinfreservetransporte-boop.github.io/intranet-infreserve/login_page.html" class="btn-login" id="btn" style="display:none">
            Volver al Login
        </a>
    </div>

    <script>
        (function() {
            // Limpiar TODO el almacenamiento relacionado con la sesión
            var keysToRemove = [
                'infreserve_session',
                'infreserve_user',
                'infreserve_login_time',
                'infreserve_token',
                'infreserve_rol',
                'infreserve_departamento'
            ];

            keysToRemove.forEach(function(key) {
                try {
                    localStorage.removeItem(key);
                    sessionStorage.removeItem(key);
                } catch(e) {
                    console.log('Error limpiando ' + key + ':', e);
                }
            });

            // Limpiar cookies relacionadas (si existen)
            document.cookie.split(';').forEach(function(cookie) {
                var parts = cookie.split('=');
                var name = parts[0].trim();
                if (name.indexOf('infreserve') !== -1 || name.indexOf('session') !== -1) {
                    document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
                }
            });

            console.log('Sesión limpiada completamente desde logout.html');

            // Mostrar estado final después de 1.5 segundos
            setTimeout(function() {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('icon').style.display = 'block';
                document.getElementById('title').textContent = 'Sesión cerrada';
                document.getElementById('text').textContent = 'Tu sesión ha sido cerrada de forma segura. Puedes volver al login cuando lo desees.';
                document.getElementById('btn').style.display = 'inline-block';
            }, 1500);

            // Redirección automática opcional después de 5 segundos
            // Descomenta la siguiente línea si quieres redirección automática:
            // setTimeout(function() { window.location.href = 'https://iinfreservetransporte-boop.github.io/intranet-infreserve/login_page.html'; }, 5000);
        })();
    </script>
</body>
</html>
