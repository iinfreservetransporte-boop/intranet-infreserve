<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Infreserve Intranet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #0B2B5E 0%, #1A4A8A 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); width: 90%; max-width: 420px; }
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-header h1 { color: #0B2B5E; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .login-header p { color: #64748b; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #374151; }
    .form-input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; }
    .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #0B2B5E 0%, #1A4A8A 100%); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .alert { padding: 12px 16px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; display: none; }
    .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
    .loading { text-align: center; color: #666; margin-top: 10px; display: none; }
  </style>
<base target="_blank">
<base target="_blank">
</head>
<body>
  <script>
    // Limpiar cualquier sesión residual al cargar la página de login
    (function() {
      var keys = ['infreserve_session', 'infreserve_user', 'infreserve_login_time', 'infreserve_token'];
      keys.forEach(function(k) {
        try { localStorage.removeItem(k); sessionStorage.removeItem(k); } catch(e) {}
      });
    })();
  </script>
  <div class="login-container">
    <div class="login-header">
      <h1>Infreserve Intranet</h1>
      <p>Sistema de Gestion de Inventarios</p>
    </div>
    <div id="alertBox" class="alert"></div>
    <div class="loading" id="loading">Verificando credenciales...</div>
    <form id="loginForm" onsubmit="return false;">
      <div class="form-group">
        <label class="form-label">Correo Corporativo</label>
        <input type="email" id="email" class="form-input" placeholder="usuario@infreserve.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Contrasena</label>
        <input type="password" id="password" class="form-input" placeholder="********" required>
      </div>
      <button type="button" class="btn-login" onclick="login()">Iniciar Sesion</button>
    </form>
  </div>

  <script>
    const INTRANET_URL = 'https://iinfreservetransporte-boop.github.io/intranet-infreserve/infreserve_intranet_moderna.html';

    function showAlert(type, message) {
      var alertBox = document.getElementById('alertBox');
      alertBox.className = 'alert alert-' + type;
      alertBox.textContent = message;
      alertBox.style.display = 'block';
      setTimeout(function() { alertBox.style.display = 'none'; }, 5000);
    }

    function login() {
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value.trim();
      var loadingDiv = document.getElementById('loading');

      if (!email || !password) {
        showAlert('error', 'Complete todos los campos');
        return;
      }

      loadingDiv.style.display = 'block';

      google.script.run
        .withSuccessHandler(function(result) {
          loadingDiv.style.display = 'none';
          console.log('Respuesta servidor:', result);

          if (result && result.exito) {
            showAlert('success', 'Bienvenido ' + result.nombre);
            var sessionData = {
              id: result.id, email: result.email, nombre: result.nombre,
              rol: result.rol, departamento: result.departamento,
              token: result.token, loginTime: new Date().toISOString()
            };
            localStorage.setItem('infreserve_session', JSON.stringify(sessionData));
            setTimeout(function() {
              window.top.location.href = INTRANET_URL + '?token=' + encodeURIComponent(JSON.stringify(sessionData));
            }, 1500);
          } else {
            showAlert('error', (result && result.error) ? result.error : 'Error desconocido del servidor');
          }
        })
        .withFailureHandler(function(error) {
          loadingDiv.style.display = 'none';
          console.error('Error google.script.run:', error);
          showAlert('error', 'Error de comunicacion: ' + error.message);
        })
        .autenticarUsuario(email, password);
    }

    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
